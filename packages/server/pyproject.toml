[project]
name = "wudao-server"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "aiohttp>=3.10.0",
  "fastapi>=0.115.0",
  "httpx[socks]>=0.28.0",
  "python-multipart>=0.0.20",
  "uvicorn>=0.35.0",
  "websockets>=14.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
